baseURL = 'https://www.tdpie.tech/'
languageCode = 'zh-cn'
defaultContentLanguage = 'zh-cn'
title = 'TDPie Tech'
theme = 'PaperMod'

[params]
  author = 'TDPie'
  description = '半导体技术博客，IT技术博客 - 深度解析半导体行业前沿技术与AI应用'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  ShowWordCount = true
  comments = true
  ShowSearch = true

  [params.homeInfoParams]
    Title = "Hi, I am TDPie"
    Content = "半导体技术爱好者 / IT技术探索者\n专注半导体前沿技术与人工智能应用，分享技术深度解析与行业洞察。"

[[params.socialIcons]]
  name = 'github'
  url = 'https://github.com/TZN-maker'

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 100
  threshold = 0.4
  minMatchCharLength = 2
  keys = ["title", "permalink", "content", "tags"]

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = true
    style = 'monokai'
    tabWidth = 4

  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

  [markup.tableOfContents]
    endLevel = 4
    ordered = true
    startLevel = 2

[[menus.main]]
  identifier = 'home'
  name = '首页'
  url = '/'
  weight = 10

[[menus.main]]
  identifier = 'tech'
  name = '半导体技术精帖'
  url = '/categories/半导体技术精帖/'
  weight = 20

[[menus.main]]
  identifier = 'semi'
  name = '第三代半导体'
  url = '/categories/第三代半导体/'
  weight = 30

[[menus.main]]
  identifier = 'ai'
  name = '人工智能'
  url = '/categories/人工智能/'
  weight = 40

[[menus.main]]
  identifier = 'about'
  name = '关于我'
  url = '/about/'
  weight = 50

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[taxonomies]
  tag = 'tags'
  category = 'categories'