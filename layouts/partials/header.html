<header class="header">
    <nav class="nav">
        <div class="logo">
            <a href="{{ "" | absLangURL }}" accesskey="h" title="{{ site.Title }} (Alt + H)">
                <img src="/images/logo.png" alt="半导体技术博客，IT技术博客" height="36" onerror="this.style.display='none'">
                <span>{{ site.Title }}</span>
            </a>
        </div>
        <ul id="menu" class="menu">
            {{- range site.Menus.main }}
            {{- $menu_item_url := (cond (strings.HasSuffix .URL "/") .URL (printf "%s/" .URL) ) | absLangURL }}
            {{- $page_url:= $.Permalink | absLangURL }}
            <li>
                <a href="{{ .URL | absLangURL }}" title="{{ .Title | default .Name }}"
                {{- if eq $menu_item_url $page_url }} class="active"{{- end }}>
                    {{- .Name -}}
                </a>
            </li>
            {{- end }}
        </ul>
    </nav>
</header>
